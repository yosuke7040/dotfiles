description = "仕様駆動開発を始める。コードを書く前に構造化された仕様を書く。"

prompt = """
spec-driven-development スキルを起動する。

まず、ユーザーが何を作りたいのかを理解する。次の点について明確化の質問をする:
1. 目的と対象ユーザー
2. 中核機能と受け入れ条件
3. 技術スタックの希望と制約
4. 既知の境界（常に行うこと、先に確認すること、決して行わないこと）

その後、目的、コマンド、プロジェクト構造、コードスタイル、テスト戦略、境界という 6 つの中核領域を含む構造化された仕様を作成する。

仕様はプロジェクトルートの SPEC.md として保存し、先へ進む前にユーザーへ確認する。

## 仕様の adversarial レビュー（Codex 連携）

SPEC.md をユーザーが承認したら、その内容を Codex に adversarial review してもらう提案を行う。これは上流で仕様の前提・矛盾・抜けを潰し、下流（/plan、/build）の手戻りを防ぐためである。

手順:

1. ユーザーに「仕様を Codex で adversarial review しますか？」と確認する。重い議論を避けたい場合はスキップ可。
2. 承認されたら、`codex-second-opinion` スキルを起動する。モードは「議論モード」相当で、request_type は `design_review`、対象は SPEC.md。Codex への質問は仕様自体に対する challenge とし、次のような観点で 5〜7 件構築する:
   - SPEC.md が暗黙に置いている前提のうち、現実で崩れうるものは何か
   - 仕様内で矛盾している、または競合している記述はあるか
   - 「常に行う」「決して行わない」境界に抜けはあるか
   - 受け入れ条件で測れない曖昧さはどこか
   - 下流フェーズ（/plan, /build）で顕在化しそうなリスクはどれか
3. codex-second-opinion が Codex を実行して結果を返したら、Claude は要約と元の verbatim 出力の両方をユーザーに提示する。
4. Codex の指摘を踏まえ、SPEC.md を更新するか、現状で /plan へ進むかをユーザーに判断させる。

スキップが選ばれた場合、または codex-second-opinion が利用不可の場合は、その旨を明示してから次フェーズの案内をする。
"""
