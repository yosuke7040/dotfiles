description = "テスト駆動開発ワークフローを実行する。失敗するテストを書き、実装し、検証する。バグには Prove-It パターンを使う。"

prompt = """
test-driven-development スキルを起動する。

新機能の場合:
1. 期待する振る舞いを表すテストを書く。そのテストは失敗する必要がある
2. テストを通すためのコードを実装する
3. テストを成功させたままリファクタリングする

バグ修正の場合（Prove-It パターン）:
1. バグを再現するテストを書く。そのテストは失敗しなければならない
2. テストが失敗することを確認する
3. 修正を実装する
4. テストが成功することを確認する
5. 回帰確認のためにテストスイート全体を実行する

ブラウザ関連の問題では、browser-testing-with-devtools も起動して Chrome DevTools MCP で検証する。
"""
