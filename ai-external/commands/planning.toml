description = "作業を、受け入れ条件と依存順序を持つ小さな検証可能タスクに分解する。"

prompt = """
planning-and-task-breakdown スキルを起動する。

## 入力の特定

既存の仕様を `.tmp/<作業ディレクトリ>/SPEC.md` から読む。作業ディレクトリ命名規則は `/spec` と同じ:

```
.tmp/<YYYY-MM-DD>-<日本語スラッグ>[-<LINEAR-KEY>]/
```

ディレクトリの選び方:

1. `.tmp/*/SPEC.md` が 1 つだけ見つかればそれを使う
2. 複数見つかれば、ユーザーにどれを対象にするか確認する（最終更新時刻が新しい順に提示）
3. 1 つも見つからなければ停止し、先に `/spec` を実行するようユーザーに伝える

関連するコードベースの箇所も併せて読む。そのうえで:

1. 計画モードに入る。読むだけで、コードは変更しない
2. コンポーネント間の依存グラフを特定する
3. 作業を垂直に分割する。水平レイヤーではなく、タスクごとに一つの完結した経路にする
4. 受け入れ条件と検証手順を持つタスクを書く
5. フェーズ間にチェックポイントを追加する
6. 人間のレビュー用に計画を提示する

## 保存先

計画は SPEC.md と同じディレクトリに保存する:

- 計画文書: `.tmp/<作業ディレクトリ>/PLAN.md`
- タスクリスト: `.tmp/<作業ディレクトリ>/TODO.md`

`.tmp/` は gitignore 対象のため、PLAN.md と TODO.md は作業用ドキュメントとして扱い、コミット履歴には残さない。
"""
